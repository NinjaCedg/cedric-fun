/* Animation 1: Moving Dashes (Flow effect) */

    from { stroke-dashoffset: 100; }
    to { stroke-dashoffset: 0; }
}

<script>



$("exportBtn").onclick = () => {
    const rawData = editor.export().drawflow.Home.data;
    const nodes = [];
    const links = [];

    // Transform Drawflow format back to your Schema format
    Object.keys(rawData).forEach(id => {
        const node = rawData[id];
        const d = node.data;
        
        // Reconstruction logic based on node type
        let resolver = {};
        if (d.apiCall) {
            resolver = { inline: { apiCall: d.apiCall } };
        } else if (d.isScriptOnly) {
            resolver = { inline: { script: { code: d.transformer, language: d.language || "JSONATA" } } };
        } else {
            resolver = { 
                inline: { 
                    aiPrompt: { 
                        promptTemplate: d.prompt, 
                        responseFormat: { json: { schema: d.schema } } 
                    } 
                },
                inputTransformer: { code: d.transformer || "($)" }
            };
        }

        nodes.push({
            id: d.nodeId || d.id || `node_${id}`,
            resolver: resolver,
            executionMode: d.executionMode || "EXECUTION_MODE_IMMEDIATE"
        });

        // Capture Links
        node.outputs.output_1.connections.forEach(conn => {
            const targetNode = rawData[conn.node].data;
            links.push({
                fromNodeId: d.nodeId || d.id,
                toNodeId: targetNode.nodeId || targetNode.id
            });
        });
    });

    const exportData = { nodes, links };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `agent-flow-export-${new Date().getTime()}.json`;
    a.click();
};




// RESTORED SIMULATION LOGIC
async function runFullSimulation(rootInput) {
    const nodes = editor.export().drawflow.Home.data;
    let globalContext = JSON.parse(JSON.stringify(rootInput)); 
    const executed = new Set();
    
    // Reset UI
    document.querySelectorAll('.node-result-tray').forEach(el => el.innerHTML = "");
    
    // Initial Log Entry
    $("logContent").innerHTML = `
        <div class="log-entry" style="border-left-color: #f59e0b">
            <div class="log-title">PIPELINE START (ROOT CONTEXT)</div>
            <code class="log-code">${JSON.stringify(globalContext, null, 2)}</code>
        </div>`;

    while (executed.size < Object.keys(nodes).length) {
        const readyNodes = Object.keys(nodes).filter(id => 
            !executed.has(id) && 
            nodes[id].inputs.input_1.connections.every(c => executed.has(c.node.toString()))
        );
        
        if (!readyNodes.length) break;
        
        // Capture Snapshot for this parallel execution level
        const snapshot = JSON.parse(JSON.stringify(globalContext));
        const levelResults = [];

        for (const id of readyNodes) {
            const nodeEl = document.getElementById('node-'+id);
            nodeEl.classList.add('running');
            const d = nodes[id].data;
            
            try {
                // 1. JSONata Mapping
                const payload = await jsonata(d.transformer || "($)").evaluate(snapshot);
                
                // 2. Prompt Rendering
                const renderedPrompt = d.prompt.replace(/\{\{(.*?)\}\}/g, (m, e) => {
                    try { return new Function(...Object.keys(payload), `return ${e}`)(...Object.values(payload)); } catch { return m; }
                });

                // 3. AI Execution
                const aiRes = await callAI(renderedPrompt, d.schema);
                const parsed = JSON.parse(aiRes);
                
                // 4. Update Node UI
                nodeEl.querySelector('.node-result-tray').innerText = JSON.stringify(parsed, null, 2);
                nodeEl.classList.replace('running', 'completed');
                
                // 5. DEEP LOGGING INJECTION
                $("logContent").innerHTML += `
                    <div class="log-entry">
                        <div class="log-title">AGENT @${d.nodeId} COMPLETED</div>
                        
                        <span class="log-label" style="font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 600;">1. Input Snapshot Seen</span>
                        <code class="log-code" style="color: #e2e8f0; border-color: #334155;">${JSON.stringify(snapshot, null, 2)}</code>

                        <span class="log-label" style="font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 600;">2. JSONata Mapping Output</span>
                        <code class="log-code" style="color: #38bdf8; border-color: #0c4a6e;">${JSON.stringify(payload, null, 2)}</code>

                        <span class="log-label" style="font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 600;">3. Final Rendered Prompt</span>
                        <div class="log-code" style="color: #c084fc; border-color: #4c1d95; background: #1e1b4b;">${renderedPrompt}</div>

                        <span class="log-label" style="font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 600;">4. Model Result</span>
                        <code class="log-code" style="color: #10b981; border-color: #064e3b;">${aiRes}</code>
                    </div>`;

                levelResults.push(parsed);
            } catch (e) { 
                nodeEl.classList.remove('running');
                $("logContent").innerHTML += `
                    <div class="log-entry" style="border-left-color: #ef4444">
                        <div class="log-title text-danger">AGENT @${d.nodeId} FAILED</div>
                        <code class="log-code text-danger">${e.message}</code>
                    </div>`;
            }
            executed.add(id);
        }
        // Commit results to global context for next level
        levelResults.forEach(r => Object.assign(globalContext, r));
    }
}

const callAI = async (prompt, schema) => {
    const token = localStorage.getItem("v_token");
    const r = await fetch(`https://${localStorage.getItem("v_loc")}-aiplatform.googleapis.com/v1/projects/${localStorage.getItem("v_proj")}/locations/${localStorage.getItem("v_loc")}/publishers/google/models/gemini-2.5-flash:generateContent`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({
            "generationConfig": { "temperature": 0.1, "responseMimeType": "application/json", "responseSchema": schema },
            "contents": [{ "role": "user", "parts": [{"text": prompt}] }]
        })
    });
    const d = await r.json(); return d.candidates[0].content.parts[0].text;
};

function triggerEditFromNode(el) {
    const nodeId = el.closest('.drawflow-node').id.replace('node-', '');
    editing = nodeId;
    const d = editor.getNodeFromId(nodeId).data;
    const isScript = !!d.isScriptOnly;

    $("nodeEditorOverlay").style.display = "flex";
    $("nodeIdInput").value = d.nodeId || d.id;

    // Reset common states before branching logic
    $("promptInput").disabled = false;
    $("magicPromptBtn").style.display = "inline-block";

    if (isScript) {
        // 1. Logic Node UI State
        $("promptInput").style.display = "none";
        $("mainScriptAce").style.display = "block";
        $("mainEditorLabel").innerText = "JSONata Logic Expression";
        $("magicPromptBtn").style.display = "none"; 
        
        mainScriptAce.setValue(d.transformer || "", -1);

    } else {
        // 2. Regular Agent / API UI State
        // CRITICAL: Re-show the prompt input if it was hidden by a script node
        $("promptInput").style.display = "block";
        $("mainScriptAce").style.display = "none";
        $("mainEditorLabel").innerText = "System Prompt";

        if (d.apiCall) {
            // API Variant
            $("promptInput").value = d.apiCall.http.url;
            $("promptInput").disabled = true; // URL should be read-only in this view
        } else {
            // Standard Agent Variant
            $("promptInput").value = d.prompt || "";
        }
    }

    // 3. Handle Sidebar Code (JSONata mapping for AI Agents)
    // For script nodes, we usually leave this empty or duplicate the code
    const scriptCode = d.transformer || "($)";
    transformerAce.setValue(scriptCode, -1); 
    
    // 4. Handle Schema
    schemaEditor.set(d.schema || {});
}
const htmlOf = (d) => {
    // 1. Detect Node Type
    const isApi = !!d.apiCall;
    const isScript = !!d.isScriptOnly;
    

    console.log( "------ " + d.nodeId + " ------ ");
    console.log(d);
    // 2. Resolve Configuration
    const apiConfig = isApi ? d.apiCall.http : null;
    const title = d.nodeId || 'Agent';
    
    // 3. UI Classes & Icons
    let headerClass = 'node-header';
    let icon = 'bi-robot';
    
    if (isApi) {
        headerClass += ' api-variant';
        icon = 'bi-cloud-arrow-up';
    } else if (isScript) {
        headerClass += ' logic-variant'; // Add this to your CSS (e.g., indigo background)
        icon = 'bi-code-slash';
    }

    return `
        <div class="${headerClass}">
            <span><i class="bi ${icon} me-1"></i> @${title}</span>
            <i class="bi bi-pencil-square" onclick="triggerEditFromNode(this)" style="cursor:pointer"></i>
        </div>
        <div class="node-body">
            ${isApi ? `
                <div class="api-info">
                    <span class="badge-method">${apiConfig.method.replace('HTTP_METHOD_', '')}</span>
                    <code class="api-url">${apiConfig.url.split('/').pop()}</code>
                </div>
                <div class="api-headers-preview">
                    <i class="bi bi-link-45deg"></i> Endpoint: ${apiConfig.url.substring(0, 30)}...
                </div>
            ` : isScript ? `
                <div class="script-preview">
                    <div style="font-size: 9px; color: #6366f1; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;">
                        JSONata Expression
                    </div>

            ` : `
                <div class="prompt-text">${d.prompt || '<i>Unconfigured Agent</i>'}</div>
            `}
        </div>
        <div class="node-result-tray"></div>
    `;
};



function importFromOriginalSchema(json) {
    if (!json.nodes) return;
    editor.clear();
    
    const idMap = {};
    const levels = {};
    const parentsOf = {}; // Track who points to whom

    // 1. Initialize mapping
    json.nodes.forEach(n => {
        levels[n.id] = 0;
        parentsOf[n.id] = [];
    });

    // 2. Build dependency map and calculate levels (X-axis)
    (json.links || []).forEach(l => {
        parentsOf[l.toNodeId].push(l.fromNodeId);
    });

    // Determine horizontal level (Rank)
    for (let i = 0; i < json.nodes.length; i++) {
        (json.links || []).forEach(l => {
            levels[l.toNodeId] = Math.max(levels[l.toNodeId], levels[l.fromNodeId] + 1);
        });
    }

    const counts = {};
    const nodePositions = {}; // Store {x, y} to reference for children

    // 3. Sort nodes by level so we process parents before children
    const sortedNodes = [...json.nodes].sort((a, b) => levels[a.id] - levels[b.id]);

    sortedNodes.forEach(n => {
        const lvl = levels[n.id];
        const parents = parentsOf[n.id];
        
        let xPos = 100 + (lvl * 380);
        let yPos;

        if (lvl === 0) {
            // Root level: Just stack them
            counts[lvl] = (counts[lvl] || 0) + 1;
            yPos = 100 + (counts[lvl] * 220);
        } else {
            // Child level: Center based on parent average Y
            const parentYSum = parents.reduce((sum, pId) => sum + nodePositions[pId].y, 0);
            const avgY = parentYSum / parents.length;
            
            // To prevent overlap if multiple children share parents:
            counts[lvl] = (counts[lvl] || 0) + 1;
            yPos = avgY + ((counts[lvl] - 1) * 50); // Minimal offset if stacked
        }

        nodePositions[n.id] = { x: xPos, y: yPos };

        const nodeData = buildNodeData(n);
        const nodeClass = nodeData.isScriptOnly ? "logic-node" : (nodeData.apiCall ? "api-node" : "agent");

        idMap[n.id] = editor.addNode(
            nodeClass, 1, 1, xPos, yPos, nodeClass, nodeData, htmlOf(nodeData)
        );
    });

    // 4. Restore connections
    (json.links || []).forEach(l => { 
        if (idMap[l.fromNodeId] && idMap[l.toNodeId]) {
            editor.addConnection(idMap[l.fromNodeId], idMap[l.toNodeId], "output_1", "input_1"); 
        }
    });
}

// Helper to keep the import function clean
function buildNodeData(n) {
    const resolver = n.resolver || {};
    const inline = resolver.inline || {};
    let data = { nodeId: n.id };

    if (inline.apiCall || resolver.apiCall) {
        data.apiCall = inline.apiCall || resolver.apiCall;
    } else if (inline.script || resolver.script) {
        const s = inline.script || resolver.script;
        data.transformer = s.code;
        data.isScriptOnly = true;
    } else {
        data.prompt = inline.aiPrompt?.promptTemplate;
        data.schema = inline.aiPrompt?.responseFormat?.json?.schema;
        data.transformer = resolver.inputTransformer?.code || "($)";
    }
    return data;
}


$("magicPromptBtn").onclick = async () => {
    $("editorAiLoader").style.display = 'flex';
    
    const refineSchema = {
        type: "object",
        properties: {
            improved_prompt: { type: "string" }
        },
        required: ["improved_prompt"]
    };

    const currentPrompt = $("promptInput").value;

    // The Meta-Instruction for the Prompt Engineer AI
    const metaInstruction = `
        You are an expert Insurance Prompt Engineer. Your task is to transform a simple goal into a professional, structured system prompt for a Claim Handler AI.
        
        The final prompt MUST follow this exact structure:
        1. ROLE: Clear description ("You are a claim handler...")
        2. RULES AND SCOPE: Bullet points covering coverage, rejection reasons, and specific edge cases (e.g., Product Defect, Delivery, Cosmetic).
        3. EXTRACT: A section for {{JSON.stringify(inputPrompt)}}.
        4. RESPONSE FORMAT: Strict JSON output requirements (aiEnrichmentStatus, aiEnrichmentExplanation, aiEnrichmentConfidence).
        5. WARNINGS: Critical logic guards (e.g., handle customer statements as declarative, possession rules, grey zones).

        Input Goal to refine: "${currentPrompt}"
    `;

    try {
        const r = await callAI(metaInstruction, refineSchema);
        const parsed = JSON.parse(r);
        $("promptInput").value = parsed.improved_prompt;
    } catch (e) {
        console.error("Refinement failed:", e);
        alert("AI Refine failed. Please check your connection.");
    } finally {
        $("editorAiLoader").style.display = 'none';
    }
};
